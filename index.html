<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEONARDOALZOGARAY.com | Análisis & Innovación</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">LEONARDOALZOGARAY<span>.com</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="articulos.html">Artículos</a></li>
                <li><a href="sobre-mi.html">Sobre mí</a></li>
            </ul>
        </div>
    </nav>

    <div id="lt-chat-widget" style="position: fixed !important; bottom: 25px !important; right: 25px !important; z-index: 999999 !important;">
        <button id="lt-chat-button" onclick="toggleLTChat()" style="background: #000; color: #fff; border: none; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; font-size: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; outline: none;">
            💬
        </button>

        <div id="lt-chat-window" style="position: absolute; bottom: 70px; right: 0; width: 320px; height: 450px; background: white; border: 1px solid #eee; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden;">
            <div style="background: #000; color: #fff; padding: 15px; font-family: 'Playfair Display', serif; font-weight: bold;">LEONARDO.tech Assistant</div>
            <div id="lt-chat-messages" style="flex: 1; padding: 15px; overflow-y: auto; font-family: 'Inter', sans-serif; font-size: 14px; background: #fafafa; color: #333;">
                <p><strong>Asistente:</strong> ¡Hola! Soy el asistente virtual de <strong>LEONARDO.tech</strong>. ¿En qué puedo ayudarte hoy?</p>
            </div>
            <div style="padding: 10px; border-top: 1px solid #eee; display: flex; background: #fff;">
                <input type="text" id="lt-user-input" style="flex: 1; border: 1px solid #ddd; padding: 8px; border-radius: 4px;" placeholder="Escribí aquí..." onkeypress="if(event.key==='Enter') sendLTMessages()">
                <button onclick="sendLTMessages()" style="background: #000; color: #fff; border: none; padding: 8px 12px; margin-left: 5px; border-radius: 4px; cursor: pointer;">Enviar</button>
            </div>
        </div>
    </div>

    <header class="container" style="margin-top: 60px; text-align: center;">
        <span class="post-meta" style="letter-spacing: 3px;">DESDE 1993</span>
        <h1 style="font-size: 3.5rem; margin: 20px 0;">Análisis, Innovación y el Factor Humano</h1>
    </header>

    <script>
        function toggleLTChat() {
            const win = document.getElementById('lt-chat-window');
            win.style.display = (win.style.display === 'none' || win.style.display === '') ? 'flex' : 'none';
        }

        function sendLTMessages() {
            const input = document.getElementById('lt-user-input');
            const msgs = document.getElementById('lt-chat-messages');
            if (input.value.trim() !== "") {
                msgs.innerHTML += `<div style="text-align:right; margin-bottom: 10px;"><p><strong>Tú:</strong> ${input.value}</p></div>`;
                input.value = "";
                msgs.scrollTop = msgs.scrollHeight;
                
                // Aquí es donde simulamos la respuesta hasta que la API de Google te de el OK final
                setTimeout(() => {
                    msgs.innerHTML += `<div style="margin-bottom: 10px;"><p><strong>LEONARDO.tech:</strong> Recibido. Estoy procesando tu consulta con el motor de Google Cloud...</p></div>`;
                    msgs.scrollTop = msgs.scrollHeight;
                }, 1000);
            }
        }
    </script>
</body>
</html>
